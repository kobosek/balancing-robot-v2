<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Balancing Robot Control Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1800px; /* Increased to accommodate larger graph */
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #333;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #configMenu {
            display: none;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        canvas {
            border: 1px solid #ddd;
            margin-top: 20px;
        }
        .data-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .data-box {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
        .flex-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .visualization-section {
            flex: 1;
        }

        .config-section {
            flex: 1;
            margin-right: 20px;
        }
        .graph-container {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
            width: 100%;
            height: 800px; /* Increased height */
        }
        .data-box {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
        .legend-item {
            margin-bottom: 10px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legend-color {
            width: 20px;
            height: 3px;
            display: inline-block;
        }
        .legend-value {
            font-weight: bold;
        }
        #speedGraph {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 Balancing Robot Control Panel</h1>
        <div class="flex-container">
            <div class="config-section">
                <button id="openConfigBtn">Open Configuration</button>
                
                <div id="configMenu">
                    <!-- Configuration buttons for Angle and Speed controllers will be dynamically added here -->
                    <button id="saveConfigBtn" style="display: none;">Save General Configuration</button>
                </div>
            </div>
            <div class="visualization-section">
                <canvas id="robotCanvas" width="300" height="400"></canvas>
                <div class="data-container">
                    <div class="data-box">
                        <h2>Current Angle: <span id="currentAngle">0.00</span>°</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="graph-container">
            <div id="legend" style="position: absolute; margin: 20px;">
                <div class="legend-item">
                    <span class="legend-color" style="background: #2196F3;"></span>
                    Desired Speed: <span class="legend-value" id="desiredSpeedValue">0</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #f44336;"></span>
                    Current Speed: <span class="legend-value" id="currentSpeedValue">0</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #ffeb3b;"></span>
                    RMSE: <span class="legend-value" id="rmseValue">0</span>
                </div>
            </div>
            <canvas id="speedGraph" width="1024" height="860"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const openConfigBtn = document.getElementById('openConfigBtn');
            const configMenu = document.getElementById('configMenu');
            const canvas = document.getElementById('robotCanvas');
            const ctx = canvas.getContext('2d');
            let angle = 0;
            let wheelRotation = 0;
            const speedGraph = document.getElementById('speedGraph');
            const speedCtx = speedGraph.getContext('2d');
            const maxDataPoints = 400; // Number of points to show on graph
            const speedData = {
                desired: Array(maxDataPoints).fill(0),
                current: Array(maxDataPoints).fill(0),
                rmse: Array(maxDataPoints).fill(0)
            };
            // Create buttons for both controllers
            const angleConfigBtn = document.createElement('button');
            angleConfigBtn.textContent = 'Angle PID Config';
            angleConfigBtn.style.display = 'none';
            configMenu.appendChild(angleConfigBtn);

            const speedConfigBtn = document.createElement('button');
            speedConfigBtn.textContent = 'Speed PID Config';
            speedConfigBtn.style.display = 'none';
            configMenu.appendChild(speedConfigBtn);

            // Create forms for angle and speed configurations
            const angleConfigForm = createConfigForm('pid_angle');
            angleConfigForm.style.display = 'none';
            configMenu.appendChild(angleConfigForm);

            const speedConfigForm = createConfigForm('pid_speed');
            speedConfigForm.style.display = 'none';
            configMenu.appendChild(speedConfigForm);

            // Show/hide configuration menu
            openConfigBtn.addEventListener('click', function () {
                console.log('Open Configuration button clicked'); // Debugging log
                if (configMenu.style.display === 'none' || configMenu.style.display === '') {
                    console.log('Showing configuration menu'); // Debugging log
                    configMenu.style.display = 'block';
                    angleConfigBtn.style.display = 'block';
                    speedConfigBtn.style.display = 'block';
                } else {
                    console.log('Hiding configuration menu'); // Debugging log
                    configMenu.style.display = 'none';
                    angleConfigForm.style.display = 'none';
                    speedConfigForm.style.display = 'none';
                }
            });

            // Event listeners for showing forms
            angleConfigBtn.addEventListener('click', function() {
                toggleForms(angleConfigForm, speedConfigForm);
                loadConfig('pid_angle', angleConfigForm);
            });

            speedConfigBtn.addEventListener('click', function() {
                toggleForms(speedConfigForm, angleConfigForm);
                loadConfig('pid_speed', speedConfigForm);
            });

            function drawSpeedGraph() {
                const width = speedGraph.width;
                const height = speedGraph.height;
                const padding = 70;
                
                // Clear the canvas
                speedCtx.clearRect(0, 0, width, height);
                
                // Draw background grid
                speedCtx.strokeStyle = '#eee';
                speedCtx.lineWidth = 1;
                
                // Draw horizontal grid lines
                const gridSteps = 16;  // For steps of 100 in the range -800 to 800
                for(let i = 0; i <= gridSteps; i++) {
                    const y = padding + (height - 2 * padding) * (i/gridSteps);
                    speedCtx.beginPath();
                    speedCtx.moveTo(padding, y);
                    speedCtx.lineTo(width - padding, y);
                    speedCtx.stroke();
                    
                    // Add speed labels with larger font
                    speedCtx.fillStyle = '#666';
                    speedCtx.font = '16px Arial';
                    speedCtx.textAlign = 'right';
                    const speedValue = 800 - (i * 1600/gridSteps);  // Changed to 800 range
                    speedCtx.fillText(speedValue.toFixed(0), padding - 10, y + 5);
                }
                
                // Draw vertical grid lines (time markers every 0.5 seconds)
                const timeSteps = 4;  // One mark every 0.5 seconds for 5 seconds
                for(let i = 0; i <= timeSteps; i++) {
                    const x = padding + (width - 2 * padding) * (i/timeSteps);
                    speedCtx.beginPath();
                    speedCtx.moveTo(x, padding);
                    speedCtx.lineTo(x, height - padding);
                    speedCtx.stroke();
                    
                    // Add time labels (0 to 5 seconds)
                    speedCtx.fillStyle = '#666';
                    speedCtx.font = '14px Arial';
                    speedCtx.textAlign = 'center';
                    const seconds = (i * 0.5).toFixed(1); // 0.5 second intervals
                    speedCtx.fillText(`${seconds}s`, x, height - padding/2);
                }
                
                // Draw zero line
                speedCtx.strokeStyle = '#999';
                speedCtx.setLineDash([5, 5]);
                speedCtx.beginPath();
                const zeroY = padding + (height - 2 * padding) * 0.5;
                speedCtx.moveTo(padding, zeroY);
                speedCtx.lineTo(width - padding, zeroY);
                speedCtx.stroke();
                speedCtx.setLineDash([]);
                
                // Draw the speed lines
                const drawLine = (data, color) => {
                    speedCtx.strokeStyle = color;
                    speedCtx.lineWidth = 3;
                    speedCtx.beginPath();
                    
                    data.forEach((speed, index) => {
                        const x = padding + (width - 2 * padding) * (index / (maxDataPoints - 1));
                        const normalizedSpeed = (speed + 800) / 1600;  // Changed to 800 range
                        const y = padding + (height - 2 * padding) * (1 - normalizedSpeed);
                        
                        if(index === 0) {
                            speedCtx.moveTo(x, y);
                        } else {
                            speedCtx.lineTo(x, y);
                        }
                    });
                    
                    speedCtx.stroke();
                };
                
                // Draw desired speed in blue
                drawLine(speedData.desired, '#2196F3');
                // Draw current speed in red
                drawLine(speedData.current, '#f44336');

                //draw rmse in yellow
                drawLine(speedData.rmse, '#ffeb3b');
                
                // Add legend with larger font
                speedCtx.font = '18px Arial';
                speedCtx.fillStyle = '#2196F3';
                speedCtx.fillText('Desired Speed', width - 200, 30);
                speedCtx.fillStyle = '#f44336';
                speedCtx.fillText('Current Speed', width - 200, 60);
            }            
            function createConfigForm(idPrefix) {
                const form = document.createElement('div');

                const fields = [
                    { label: 'PID Kp', id: `${idPrefix}_kp`, step: '0.01' },
                    { label: 'PID Ki', id: `${idPrefix}_ki`, step: '0.01' },
                    { label: 'PID Kd', id: `${idPrefix}_kd`, step: '0.01' },
                    { label: 'PID Output Min', id: `${idPrefix}_output_min` },
                    { label: 'PID Output Max', id: `${idPrefix}_output_max` },
                    { label: 'PID ITerm Min', id: `${idPrefix}_iterm_min` },
                    { label: 'PID ITerm Max', id: `${idPrefix}_iterm_max` }
                ];

                fields.forEach(field => {
                    const formGroup = document.createElement('div');
                    formGroup.className = 'form-group';
                    
                    const label = document.createElement('label');
                    label.textContent = field.label;
                    formGroup.appendChild(label);

                    const input = document.createElement('input');
                    input.type = 'number';
                    input.id = field.id;
                    if (field.step) input.step = field.step;
                    formGroup.appendChild(input);

                    form.appendChild(formGroup);
                });

                const saveBtn = document.createElement('button');
                saveBtn.textContent = 'Save Configuration';
                saveBtn.addEventListener('click', function() {
                    saveConfig(idPrefix, form);
                });

                form.appendChild(saveBtn);
                return form;
            }

            function toggleForms(showForm, hideForm) {
                showForm.style.display = 'block';
                hideForm.style.display = 'none';
            }

            function loadConfig(type, form) {
                fetch('/api/config')
                    .then(response => response.json())
                    .then(data => {
                        if (data[type]) {
                            const config = data[type];
                            Object.keys(config).forEach(key => {
                                const input = form.querySelector(`#${type}_${key}`);
                                if (input) input.value = config[key];
                            });
                        } else {
                            console.error(`Configuration type "${type}" not found in the response.`);
                        }
                    })
                    .catch(error => console.error(`Error loading ${type} configuration:`, error));
            }

            function saveConfig(type, form) {
                const config = {};
                const inputs = form.querySelectorAll('input');

                inputs.forEach(input => {
                    const key = input.id.replace(`${type}_`, '');
                    config[key] = parseFloat(input.value);
                });

                fetch('/api/config')
                    .then(response => response.json())
                    .then(currentConfig => {
                        currentConfig[type] = config;

                        return fetch('/api/config', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(currentConfig),
                        });
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`Failed to save ${type} configuration`);
                        }
                        alert(`${type} configuration saved successfully`);
                    })
                    .catch(error => console.error(`Error saving ${type} configuration:`, error));
            }
            function updateData() {
            fetch('/data', {
                method: 'GET',
                cache: 'no-cache',
                headers: {
                    'Cache-Control': 'no-cache',
                    'Pragma': 'no-cache'
                }
            })
            .then(response => response.json())
            .then(jsonData => {
                if (!jsonData.data || jsonData.data.length === 0) return;

                const intervalMs = jsonData.interval_ms;
                const batchData = jsonData.data;

                // Update graph data with all points in the batch
                batchData.forEach(point => {
                    const [newAngle, desiredSpeed, currentSpeed, rmse] = point;
                    
                    speedData.desired.push(desiredSpeed);
                    speedData.desired.shift();
                    speedData.current.push(currentSpeed);
                    speedData.current.shift();
                    speedData.rmse.push(rmse);
                    speedData.rmse.shift();
                });

                // Update display values with last point in batch
                const lastPoint = batchData[batchData.length - 1];
                angle = lastPoint[0];
                document.getElementById('currentAngle').textContent = angle.toFixed(2);
                document.getElementById('desiredSpeedValue').textContent = lastPoint[1].toFixed(2);
                document.getElementById('currentSpeedValue').textContent = lastPoint[2].toFixed(2);
                document.getElementById('rmseValue').textContent = lastPoint[3].toFixed(2);
                
                // Update both visualizations
                drawRobot();
                drawSpeedGraph();
            })
            .catch(error => console.error('Error fetching data:', error));
        }

            function drawRobot() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Save the canvas state
                ctx.save();

                // Move to the center bottom of the canvas
                ctx.translate(canvas.width / 2, canvas.height - 100);

                // Rotate the entire robot based on the angle
                ctx.rotate(angle * Math.PI / 180);

                // Draw the body
                ctx.fillStyle = '#3498db';
                ctx.fillRect(-30, -150, 60, 150);

                // Draw the wheel
                ctx.fillStyle = '#34495e';
                ctx.beginPath();
                ctx.arc(0, 0, 50, 0, 2 * Math.PI);
                ctx.fill();

                // Draw wheel details to show rotation
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(50 * Math.cos(wheelRotation), 50 * Math.sin(wheelRotation));
                ctx.stroke();

                // Draw axle
                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, 2 * Math.PI);
                ctx.fill();

                // Restore the canvas state
                ctx.restore();
            }

            setInterval(updateData, 100);

            // Initial update
            updateData();
        });
    </script>
</body>
</html>
