      
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Balancing Robot Control Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            color: #333;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .config-section button {
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .form-container {
             margin-top: 15px;
             border: 1px dashed #ccc;
             padding: 15px;
             border-radius: 4px;
             background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        label {
            display: inline-block;
            margin-bottom: 0;
            width: 80px;
            text-align: right;
            margin-right: 10px;
            font-size: 14px;
        }
        input[type="number"] {
            width: 100px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .graph-container {
            margin-top: 30px;
            background: white;
            padding: 15px; /* Reduced padding slightly */
            border-radius: 5px;
            border: 1px solid #ddd; /* Keep the container border */
            width: 100%;
            box-sizing: border-box;
            /* Let height be determined by aspect ratio or content, or set explicitly */
             height: 60vh; /* Use viewport height for responsiveness */
            position: relative;
        }
        /* Target the canvas directly inside the container */
        .graph-container canvas {
            display: block; /* Remove extra space below canvas */
            border: none; /* Ensure no canvas border */
            width: 100%;
            height: 100%;
            margin: 0; /* Reset margin */
        }
        .legend {
            position: absolute;
            top: 10px;
            right: 15px; /* Adjusted for container padding */
            background: rgba(255, 255, 255, 0.85); /* Slightly less transparent */
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        .legend-item {
            margin-bottom: 5px;
            font-size: 13px; /* Slightly smaller legend font */
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 18px; /* Adjusted */
            height: 3px;
            display: inline-block;
        }
        .legend-value {
            font-weight: bold;
            min-width: 40px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 Balancing Robot Control Panel</h1>

        <!-- Configuration Section -->
        <div class="config-section">
            <h2>Configuration</h2>
            <button id="openConfigBtn">Show/Hide Config</button>
            <div id="configMenu" style="display: none;">
                <button id="angleConfigBtn">Angle PID</button>
                <button id="speedLeftConfigBtn">Speed PID Left</button>
                <button id="speedRightConfigBtn">Speed PID Right</button>

                <div id="angleConfigFormContainer" class="form-container" style="display: none;">
                    <h3>Angle PID</h3> <!-- Shortened Title -->
                    <!-- Angle form content will be added by JS -->
                </div>
                <div id="speedLeftConfigFormContainer" class="form-container" style="display: none;">
                     <h3>Speed PID Left</h3>
                     <!-- Speed Left form content will be added by JS -->
                </div>
                <div id="speedRightConfigFormContainer" class="form-container" style="display: none;">
                     <h3>Speed PID Right</h3>
                     <!-- Speed Right form content will be added by JS -->
                </div>
            </div>
        </div>

        <!-- Graph Section -->
        <h2>Telemetry Graph</h2>
        <div class="graph-container">
            <div id="legend" class="legend">
                 <!-- Legend items updated by JS -->
                 <div class="legend-item">
                    <span class="legend-color" style="background: #9C27B0;"></span> <!-- Purple - Angle -->
                    Angle: <span class="legend-value" id="angleValueLegend">0</span>
                </div>
                 <div class="legend-item">
                    <span class="legend-color" style="background: #2196F3;"></span>
                    Desired Speed: <span class="legend-value" id="desiredSpeedValueLegend">0</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #f44336;"></span>
                    Speed (L): <span class="legend-value" id="currentSpeedValueLLegend">0</span>
                </div>
                 <div class="legend-item">
                    <span class="legend-color" style="background: #4CAF50;"></span>
                    Speed (R): <span class="legend-value" id="currentSpeedValueRLegend">0</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #ffeb3b;"></span>
                    RMSE (L): <span class="legend-value" id="rmseValueLLegend">0</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #FF9800;"></span>
                    RMSE (R): <span class="legend-value" id="rmseValueRLegend">0</span>
                </div>
            </div>
            <canvas id="telemetryGraph"></canvas> <!-- Changed ID for clarity -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Get DOM Elements ---
            const openConfigBtn = document.getElementById('openConfigBtn');
            const configMenu = document.getElementById('configMenu');
            const graphCanvas = document.getElementById('telemetryGraph'); // Updated ID
            const graphCtx = graphCanvas.getContext('2d');
            const graphContainer = document.querySelector('.graph-container');

            // Config Elements
            const angleConfigBtn = document.getElementById('angleConfigBtn');
            const speedLeftConfigBtn = document.getElementById('speedLeftConfigBtn');
            const speedRightConfigBtn = document.getElementById('speedRightConfigBtn');
            const angleFormContainer = document.getElementById('angleConfigFormContainer');
            const speedLeftFormContainer = document.getElementById('speedLeftConfigFormContainer');
            const speedRightFormContainer = document.getElementById('speedRightConfigFormContainer');

            // --- Data Storage ---
            const maxDataPoints = 400; // Keep ~2 seconds of data at 5ms interval
            const telemetryData = {
                angle: Array(maxDataPoints).fill(0),
                desired: Array(maxDataPoints).fill(0),
                currentL: Array(maxDataPoints).fill(0),
                currentR: Array(maxDataPoints).fill(0),
                rmseL: Array(maxDataPoints).fill(0),
                rmseR: Array(maxDataPoints).fill(0)
            };

            // --- Create Config Forms ---
            const angleForm = createConfigForm('pid_angle');
            angleFormContainer.appendChild(angleForm);
            const speedLeftForm = createConfigForm('pid_speed_left');
            speedLeftFormContainer.appendChild(speedLeftForm);
            const speedRightForm = createConfigForm('pid_speed_right');
            speedRightFormContainer.appendChild(speedRightForm);

            // --- Configuration Handling Functions ---
             openConfigBtn.addEventListener('click', function () {
                const isHidden = configMenu.style.display === 'none' || configMenu.style.display === '';
                configMenu.style.display = isHidden ? 'block' : 'none';
                if (!isHidden) { // If hiding menu, hide all forms
                    angleFormContainer.style.display = 'none';
                    speedLeftFormContainer.style.display = 'none';
                    speedRightFormContainer.style.display = 'none';
                }
            });

            angleConfigBtn.addEventListener('click', function() {
                toggleForms(angleFormContainer, [speedLeftFormContainer, speedRightFormContainer]);
                loadConfig('pid_angle', angleForm);
            });

            speedLeftConfigBtn.addEventListener('click', function() {
                toggleForms(speedLeftFormContainer, [angleFormContainer, speedRightFormContainer]);
                loadConfig('pid_speed_left', speedLeftForm);
            });

             speedRightConfigBtn.addEventListener('click', function() {
                toggleForms(speedRightFormContainer, [angleFormContainer, speedLeftFormContainer]);
                loadConfig('pid_speed_right', speedRightForm);
            });

            function createConfigForm(idPrefix) {
                const formDiv = document.createElement('div');
                const fields = [
                    { label: 'Kp', id: `${idPrefix}_kp`, step: '0.01' }, { label: 'Ki', id: `${idPrefix}_ki`, step: '0.01' }, { label: 'Kd', id: `${idPrefix}_kd`, step: '0.0001' },
                    { label: 'Out Min', id: `${idPrefix}_output_min`, step: '0.1' }, { label: 'Out Max', id: `${idPrefix}_output_max`, step: '0.1' },
                    { label: 'ITerm Min', id: `${idPrefix}_iterm_min`, step: '0.1' }, { label: 'ITerm Max', id: `${idPrefix}_iterm_max`, step: '0.1' }
                ];
                fields.forEach(field => {
                    const group = document.createElement('div'); group.className = 'form-group';
                    const lbl = document.createElement('label'); lbl.htmlFor = field.id; lbl.textContent = field.label + ':';
                    const inp = document.createElement('input'); inp.type = 'number'; inp.id = field.id; inp.name = field.id; if (field.step) inp.step = field.step;
                    group.appendChild(lbl); group.appendChild(inp); formDiv.appendChild(group);
                });
                const btn = document.createElement('button'); btn.textContent = 'Save'; btn.style.marginTop = '10px';
                btn.addEventListener('click', () => saveConfig(idPrefix, formDiv));
                formDiv.appendChild(btn);
                return formDiv;
            }

            function toggleForms(showContainer, hideContainers) {
                showContainer.style.display = 'block';
                hideContainers.forEach(container => container.style.display = 'none');
            }

            function loadConfig(type, formElement) {
                console.log(`Loading config for: ${type}`);
                fetch('/api/config').then(r => r.ok ? r.json() : Promise.reject(`Fetch failed: ${r.status}`))
                    .then(data => {
                        if (!data || !data[type]) { throw new Error(`Config type "${type}" not found`); }
                        const config = data[type];
                        Object.keys(config).forEach(key => {
                            const inputId = `${type}_${key}`; const input = formElement.querySelector(`#${inputId}`);
                            if (input) { input.value = config[key]; } else { console.warn(`Input not found for ${inputId}`); }
                        });
                        console.log(`Config loaded for ${type}`);
                    }).catch(error => console.error(`Error loading ${type} config:`, error));
            }

            function saveConfig(type, formElement) {
                console.log(`Attempting to save config for: ${type}`);
                const newConfigSection = {}; let isValid = true;
                const inputs = formElement.querySelectorAll('input[type="number"]');
                inputs.forEach(input => {
                    const key = input.id.replace(`${type}_`, ''); const value = parseFloat(input.value);
                    if (isNaN(value)) { alert(`Invalid number for ${input.id}`); isValid = false; return; }
                    newConfigSection[key] = value;
                });
                if (!isValid) return; console.log(`New config for ${type}:`, newConfigSection);
                fetch('/api/config').then(r => r.ok ? r.json() : Promise.reject(`Fetch failed: ${r.status}`))
                    .then(currentConfig => { currentConfig[type] = newConfigSection; return currentConfig; })
                    .then(configToSend => fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(configToSend) }))
                    .then(response => { if (!response.ok) { return response.text().then(text => Promise.reject(`Save failed: ${response.status} ${text}`)); } return response.json(); })
                    .then(data => { console.log('Save response:', data); alert(`${type.replace('pid_','').replace('_',' ')} config saved!`); })
                    .catch(error => { console.error(`Error saving ${type} config:`, error); alert(`Error saving: ${error}`); });
            }
            // --- End Configuration Handling ---


            // --- Graphing Functions ---
            function resizeGraphCanvas() {
                // Resize canvas to fit container, considering device pixel ratio for sharpness
                const rect = graphContainer.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                graphCanvas.width = rect.width * dpr;
                graphCanvas.height = rect.height * dpr;
                graphCtx.scale(dpr, dpr); // Scale context to account for DPI
                graphCanvas.style.width = `${rect.width}px`;
                graphCanvas.style.height = `${rect.height}px`;
                console.log(`Resized canvas to: ${graphCanvas.width}x${graphCanvas.height} (logical: ${rect.width}x${rect.height})`);
                drawGraph(); // Redraw after resize
            }

            function drawGraph() {
                // Use logical width/height for calculations after scaling context
                const logicalWidth = graphCanvas.width / (window.devicePixelRatio || 1);
                const logicalHeight = graphCanvas.height / (window.devicePixelRatio || 1);

                const padding = { top: 10, right: 90, bottom: 30, left: 50 }; // Adjusted padding
                const graphWidth = logicalWidth - padding.left - padding.right;
                const graphHeight = logicalHeight - padding.top - padding.bottom;

                graphCtx.clearRect(0, 0, logicalWidth, logicalHeight); // Use logical size for clearRect

                // --- Draw Axes and Grid ---
                graphCtx.strokeStyle = '#ccc'; // Lighter grid
                graphCtx.lineWidth = 0.5; // Thinner grid lines
                graphCtx.font = '10px Arial'; // Smaller axis labels
                graphCtx.fillStyle = '#666';

                // Y-Axis (Speed range) - Centered at 0
                const ySpeedRange = 800; // Max absolute speed
                const ySpeedSteps = 8;
                for (let i = 0; i <= ySpeedSteps; i++) {
                    const value = ySpeedRange - (i * (2 * ySpeedRange) / ySpeedSteps);
                    const y = padding.top + graphHeight * (i / ySpeedSteps);
                    graphCtx.beginPath();
                    graphCtx.moveTo(padding.left, y);
                    graphCtx.lineTo(padding.left + graphWidth, y);
                    graphCtx.stroke();
                    graphCtx.textAlign = 'right';
                    graphCtx.fillText(value.toFixed(0), padding.left - 8, y + 3);
                }

                // Y-Axis Secondary (Angle range) - Placed on the right
                const yAngleRange = 45; // Max absolute angle degrees
                const yAngleSteps = 6; // e.g., -45, -30, -15, 0, 15, 30, 45
                graphCtx.fillStyle = '#9C27B0'; // Angle color
                for (let i = 0; i <= yAngleSteps; i++) {
                     const value = yAngleRange - (i * (2 * yAngleRange) / yAngleSteps);
                     const y = padding.top + graphHeight * (i / yAngleSteps);
                     // Draw angle tick mark slightly offset
                     graphCtx.beginPath();
                     graphCtx.moveTo(padding.left + graphWidth, y);
                     graphCtx.lineTo(padding.left + graphWidth + 5, y); // Tick pointing right
                     graphCtx.stroke(); // Use default stroke color or set angle color
                     graphCtx.textAlign = 'left';
                     graphCtx.fillText(value.toFixed(0) + '°', padding.left + graphWidth + 10, y + 3);
                }


                // X-Axis (Time)
                const totalTimeSec = (maxDataPoints * 5) / 1000.0; // Assumed 5ms ESP loop interval
                const xTimeSteps = 4; // e.g., 0, 0.5, 1.0, 1.5, 2.0s
                graphCtx.fillStyle = '#666'; // Reset color
                for (let i = 0; i <= xTimeSteps; i++) {
                    const x = padding.left + graphWidth * (i / xTimeSteps);
                    graphCtx.beginPath();
                    graphCtx.moveTo(x, padding.top);
                    graphCtx.lineTo(x, padding.top + graphHeight);
                    graphCtx.stroke();
                    graphCtx.textAlign = 'center';
                    const seconds = (i * totalTimeSec / xTimeSteps).toFixed(1);
                    graphCtx.fillText(`${seconds}s`, x, padding.top + graphHeight + 15);
                }


                // --- Draw Data Lines ---
                const drawLine = (data, color, yAxisRange = ySpeedRange) => { // Default to speed range
                    graphCtx.strokeStyle = color;
                    graphCtx.lineWidth = 1.5; // Slightly thicker lines
                    graphCtx.beginPath();
                    let firstValidPoint = true;
                    for (let index = 0; index < data.length; index++) {
                        const value = data[index];
                        if (value === null || isNaN(value)) continue; // Skip invalid points

                        const x = padding.left + graphWidth * (index / (maxDataPoints - 1));
                        const normalizedValue = (value + yAxisRange) / (2 * yAxisRange); // Normalize [-range, +range] -> [0, 1]
                        const y = padding.top + graphHeight * (1 - normalizedValue); // Invert for canvas Y-coord
                        const clampedY = Math.max(padding.top, Math.min(padding.top + graphHeight, y)); // Clamp within graph area

                        if (firstValidPoint) {
                            graphCtx.moveTo(x, clampedY);
                            firstValidPoint = false;
                        } else {
                            graphCtx.lineTo(x, clampedY);
                        }
                    }
                     if (!firstValidPoint) { // Only stroke if there were valid points
                         graphCtx.stroke();
                     }
                };

                drawLine(telemetryData.desired, '#2196F3');
                drawLine(telemetryData.currentL, '#f44336');
                drawLine(telemetryData.currentR, '#4CAF50');
                drawLine(telemetryData.rmseL, '#ffeb3b');
                drawLine(telemetryData.rmseR, '#FF9800');
                drawLine(telemetryData.angle, '#9C27B0', yAngleRange); // Use angle range for angle plot


            }

             function updateData() {
                fetch('/data', { cache: 'no-cache' })
                .then(response => {
                     if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                     return response.json();
                 })
                .then(jsonData => {
                    // Basic validation of received data structure
                    if (!jsonData || !jsonData.data || !Array.isArray(jsonData.data)) {
                         console.warn("Invalid or missing data array in response:", jsonData);
                         return;
                    }

                    const batchData = jsonData.data;
                    let dataUpdated = false; // Flag to redraw graph only if needed

                    batchData.forEach(point => {
                        // Expecting: [pitch(0), desired(1), currentL(2), currentR(3), rmseL(4), rmseR(5)]
                        if (Array.isArray(point) && point.length >= 6) {
                             // Convert to numbers immediately, handle potential non-numeric values
                             const [
                                 pitch = 0, desiredSpeed = 0, currentSpeedL = 0, currentSpeedR = 0, rmseL = 0, rmseR = 0
                             ] = point.map(v => parseFloat(v) || 0); // Default to 0 if parsing fails

                            telemetryData.angle.push(pitch); telemetryData.angle.shift();
                            telemetryData.desired.push(desiredSpeed); telemetryData.desired.shift();
                            telemetryData.currentL.push(currentSpeedL); telemetryData.currentL.shift();
                            telemetryData.currentR.push(currentSpeedR); telemetryData.currentR.shift();
                            telemetryData.rmseL.push(rmseL); telemetryData.rmseL.shift();
                            telemetryData.rmseR.push(rmseR); telemetryData.rmseR.shift();
                            dataUpdated = true; // Mark data as updated
                        } else {
                             console.warn("Received data point with unexpected structure:", point);
                        }
                    });

                    // Update Legend Values if data was received
                    if (dataUpdated && batchData.length > 0) {
                        const lastPoint = batchData[batchData.length - 1];
                         if (Array.isArray(lastPoint) && lastPoint.length >= 6) {
                             const [
                                 pitch = 0, desiredSpeed = 0, currentSpeedL = 0, currentSpeedR = 0, rmseL = 0, rmseR = 0
                             ] = lastPoint.map(v => parseFloat(v) || 0);

                             // Update legend text - use .toFixed() for formatting
                             document.getElementById('angleValueLegend').textContent = pitch.toFixed(2);
                             document.getElementById('desiredSpeedValueLegend').textContent = desiredSpeed.toFixed(1);
                             document.getElementById('currentSpeedValueLLegend').textContent = currentSpeedL.toFixed(1);
                             document.getElementById('currentSpeedValueRLegend').textContent = currentSpeedR.toFixed(1);
                             document.getElementById('rmseValueLLegend').textContent = rmseL.toFixed(2);
                             document.getElementById('rmseValueRLegend').textContent = rmseR.toFixed(2);
                         }
                    }

                    // Redraw graph only if data was actually updated
                    if (dataUpdated) {
                       drawGraph();
                    }

                })
                .catch(error => console.error('Error fetching data:', error));
            }

            // --- Initial Setup ---
            resizeGraphCanvas(); // Size the canvas initially
            window.addEventListener('resize', resizeGraphCanvas); // Adjust canvas on window resize
            const updateInterval = 100; // Fetch data every 100ms
            setInterval(updateData, updateInterval);
            updateData(); // Initial data fetch

        });
    </script>
</body>
</html>
